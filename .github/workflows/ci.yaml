name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ingest]"

    - name: Lint with ruff
      run: ruff check cortex/ tests/

    - name: Type check with mypy
      run: mypy cortex --ignore-missing-imports

    - name: Unit tests
      run: pytest tests/test_deterministic_core.py tests/test_contracts.py tests/test_fault_injection.py tests/test_t2_qualifier.py tests/test_tor_t2.py tests/test_tvp_t2.py tests/test_tvr_t2.py tests/test_rail_taxonomy.py tests/test_rail_validation.py -v --tb=short

  qualify:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ingest]"

    - name: T2 Regression guard
      run: python -m cortex.regression_guard verify
      continue-on-error: false

    - name: T2 Qualification run
      env:
        CORTEX_SQLITE: "true"
      run: python -m cortex.ci_qualify all
      continue-on-error: false

    - name: Upload T2 evidence artifact
      uses: actions/upload-artifact@v4
      with:
        name: t2-evidence
        path: .cortex/ci_evidence.json
        retention-days: 90

    - name: Verify T2 evidence signature
      run: |
        python -c "
        import json
        with open('.cortex/ci_evidence.json') as f:
            data = json.load(f)
        from cortex.tqk.t2_evidence import EvidenceCollector
        ok, msg = EvidenceCollector.verify_from_json(json.dumps(data))
        assert ok, f'Evidence signature verification failed: {msg}'
        print(f'T2 Evidence verified — {msg}')
        "

  publish:
    needs: qualify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build and publish
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        pip install build twine
        python -m build
        twine upload dist/*
