name: CI / T2 Qualification

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Self-hosted runner: neuronmesh-runner (labels: self-hosted,railway-safety)
# Runs on: app.neuronmesh.dev

jobs:
  # -------------------------------------------------------------------------
  # Quality gates — fast, runs on every push
  # -------------------------------------------------------------------------
  quality:
    name: Quality Gates
    runs-on: [self-hosted, railway-safety]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install cortex
        run: |
          pip install -e . --quiet

      - name: Lint (flake8)
        run: |
          pip install flake8 --quiet
          flake8 cortex/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Type check (mypy)
        run: |
          pip install mypy --quiet
          mypy cortex/ --ignore-missing-imports || true

  # -------------------------------------------------------------------------
  # T2 Qualification — runs on every push to master
  # -------------------------------------------------------------------------
  t2-qualification:
    name: T2 Qualification (SIL2)
    runs-on: [self-hosted, railway-safety]
    timeout-minutes: 30
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install cortex
        run: pip install -e . --quiet

      - name: Regression Guard — verify hashes
        run: |
          python -m cortex.regression_guard verify

      - name: T2 Qualification run
        run: |
          python -m cortex.ci_qualify qualify --sil-target SIL2

      - name: Upload T2 evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: t2-evidence-sil2-${{ github.sha }}
          path: |
            .cortex/ci_evidence.json
            .cortex/evidence/
          retention-days: 90

      - name: Upload expected hashes
        uses: actions/upload-artifact@v4
        with:
          name: expected-hashes
          path: .cortex/expected_hashes.json
          retention-days: 365

  # -------------------------------------------------------------------------
  # Tests — pytest suite
  # -------------------------------------------------------------------------
  tests:
    name: Tests
    runs-on: [self-hosted, railway-safety]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install + test
        run: |
          pip install -e ".[dev]" --quiet
          pytest tests/ -v --tb=short 2>&1 | head -100

  # -------------------------------------------------------------------------
  # Docs — no changes if only docs updated
  # -------------------------------------------------------------------------
  docs-check:
    name: Docs Check
    runs-on: [self-hosted, railway-safety]
    timeout-minutes: 5
    if: |
      contains(join(toJSON(github.event.commits.*.modified), ''), 'README') ||
      contains(join(toJSON(github.event.commits.*.modified), ''), 'docs/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docs updated
        run: echo "Docs changed — skipping code tests"
